# render.yaml — One-click deploy config for Render.com
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: shecode-realtime-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: false
        value: 10000
      - key: CORS_ORIGIN
        sync: false   # Set manually in Render dashboard → your Vercel URL
